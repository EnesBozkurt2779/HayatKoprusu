<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <!-- Arka Plan (OLED ve Karanlık Mod Dostu) -->
  <rect width="500" height="500" fill="#0D0F12" rx="40"/>
  
  <!-- Renk Geçiş Tanımlamaları (Gradients) -->
  <defs>
    <linearGradient id="bridgeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E676" />
      <stop offset="35%" stop-color="#00E676" />
      <stop offset="50%" stop-color="#FF1E27" />
      <stop offset="65%" stop-color="#00E676" />
      <stop offset="100%" stop-color="#00E676" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF1E27" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FF1E27" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Merkezdeki Kriz Bölgesi İçin Hafif Parlama Efekti -->
  <circle cx="250" cy="220" r="80" fill="url(#glow)"/>

  <!-- Sismik Hayat Köprüsü Çizgisi (Tek Parça Kesintisiz Akış) -->
  <path d="M 60,260 
           L 160,260 
           L 190,230 
           L 220,290 
           L 250,130 
           L 280,310 
           L 310,250 
           L 340,260 
           L 440,260" 
        fill="none" 
        stroke="url(#bridgeGradient)" 
        stroke-width="14" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>

  <!-- Mesh Düğümleri (Bağlantı Noktaları) -->
  <circle cx="250" cy="130" r="9" fill="#FF1E27" /> <!-- Tepe SOS Noktası -->
  <circle cx="220" cy="290" r="7" fill="#00E676" /> <!-- Sol Dip Düğüm -->
  <circle cx="280" cy="310" r="7" fill="#00E676" /> <!-- Sağ Dip Düğüm -->
  <circle cx="160" cy="260" r="6" fill="#FFFFFF" /> <!-- Giriş Düğümü -->
  <circle cx="340" cy="260" r="6" fill="#FFFFFF" /> <!-- Çıkış Düğümü -->

  <!-- Profesyonel Tipografi -->
  <text x="250" y="410" 
        fill="#FFFFFF" 
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
        font-size="34" 
        font-weight="900" 
        text-anchor="middle" 
        letter-spacing="6">HAYAT KÖPRÜSÜ</text>

  <!-- Alt Başlık / Protokol Adı -->
  <text x="250" y="440" 
        fill="#667085" 
        font-family="monospace" 
        font-size="14" 
        font-weight="bold" 
        text-anchor="middle" 
        letter-spacing="2">ZERO-INFRASTRUCTURE MESH</text>
</svg>
